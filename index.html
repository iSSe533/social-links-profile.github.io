<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Social links profile</title>
  <style>
    .attribution { font-size: 15px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="container">
    <main>
      <img class="image" src="assets/images/avatar-jessica.jpeg" alt="picture" width="90px">
      <h2 class="jessica">Jessica Randall</h2>
      <span class="london">London, United Kingdom</span>
      <q>Front-end developer and avid reader.</q>
    
      <a class="link" href="#">GitHub</a>
      <a class="link" href="#">Frontend Mentor</a>
      <a class="link" href="#">LinkedIn</a>
      <a class="link" href="#">Twitter</a>
      <a class="link" href="#">Instagram</a>
      
    </main>
      <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
        Coded by <a href="#">islam bunwara</a>.
      </div>
  </div>
</body>
</html>
